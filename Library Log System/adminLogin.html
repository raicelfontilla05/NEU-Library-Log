<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - NEU Library</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="bg-login">
    <header class="header">
        <div class="header-left" onclick="goHome()">
            <img src="assets/neu.png" class="header-logo" alt="NEU Logo">
            <h1 class="header-title">NEU Library Admin</h1>
        </div>
        <div class="header-right">
            <div id="header-clock"></div>
        </div>
    </header>

    <div class="page active">
        <div class="form-card">
            <h2 class="title">Admin Access</h2>
            <p style="text-align: center; color: #e0c52b; margin-bottom: 20px; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px;">Authorized Personnel Only</p>
            
            <div class="input-group">
                <label>Admin Email</label>
                <input type="email" id="admin-email" placeholder="admin@neu.edu.ph">
            </div>

            <button class="btn" onclick="validateAdmin()">Login to Dashboard</button>

            <div style="text-align: center; margin: 15px 0; color: rgba(255,255,255,0.4); font-size: 0.8rem;">OR</div>

            <button class="btn" onclick="signInWithGoogle()" style="background: white; color: #444; display: flex; align-items: center; justify-content: center; gap: 10px; border: none;">
                <img src="assets/google.png" style="width: 18px;" alt="Google">
                Admin Sign in with Google
            </button>

            <button class="btn" onclick="goToLogin()" style="margin-top: 15px; background: rgba(255,255,255,0.05); color: #ccc; border: 1px solid rgba(255,255,255,0.1);">Back to Visitor Log</button>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        setInterval(() => updateClock("header-clock"), 1000);
        updateClock("header-clock");

        function validateAdmin() {
            const email = document.getElementById("admin-email").value;
            if (email.trim() !== "") {
                location.href = "admin.html";
            } else {
                alert("Please enter an admin email address.");
            }
        }
    </script>
</body>
</html>
